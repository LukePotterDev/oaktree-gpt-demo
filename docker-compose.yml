services:
  enterprise-gpt-demo:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  enterprise-gpt-web:
    build: ./web
    ports:
      - "5050:5000"
    environment:
      - PYTHONUNBUFFERED=1
      - API_BASE_URL=http://enterprise-gpt-demo:8000
      - API_KEY=demo-key-2026
    depends_on:
      - enterprise-gpt-demo
    restart: unless-stopped
