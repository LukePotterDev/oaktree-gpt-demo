<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Oaktree GPT Demo{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; }
        .navbar { background-color: #161b22 !important; border-bottom: 1px solid #30363d; }
        .card { background-color: #161b22; border: 1px solid #30363d; }
        .table { --bs-table-bg: #161b22; --bs-table-border-color: #30363d; }
        .badge-active { background-color: #238636; }
        .badge-watch { background-color: #d29922; color: #000; }
        .badge-elevated { background-color: #da3633; }
        .badge-info { background-color: #388bfd; }
        .badge-cleared { background-color: #238636; }
        .badge-pending { background-color: #d29922; color: #000; }
        .badge-complete { background-color: #238636; }
        .badge-in-progress { background-color: #388bfd; }
        .stat-card { text-align: center; padding: 1.5rem; }
        .stat-card .stat-value { font-size: 2rem; font-weight: 700; color: #58a6ff; }
        .stat-card .stat-label { font-size: 0.85rem; color: #8b949e; text-transform: uppercase; }
        .demo-banner { background: linear-gradient(135deg, #1a1f35 0%, #0d1117 100%); border: 1px solid #30363d; border-radius: 8px; padding: 1rem 1.5rem; margin-bottom: 1.5rem; }
        .demo-banner .badge { font-size: 0.7rem; }
        a { color: #58a6ff; }
        a:hover { color: #79c0ff; }
        .breadcrumb { background: transparent; padding: 0; }
        .breadcrumb-item a { color: #8b949e; text-decoration: none; }
        .breadcrumb-item.active { color: #c9d1d9; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="fas fa-tree me-2"></i>Oaktree GPT Demo
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/clients"><i class="fas fa-users me-1"></i>Clients</a></li>
                    <li class="nav-item"><a class="nav-link" href="/research"><i class="fas fa-chart-line me-1"></i>Research</a></li>
                    <li class="nav-item"><a class="nav-link" href="/onboarding"><i class="fas fa-clipboard-check me-1"></i>Onboarding</a></li>
                    <li class="nav-item"><a class="nav-link" href="/risk"><i class="fas fa-shield-alt me-1"></i>Risk</a></li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link text-muted" href="/health"><i class="fas fa-heartbeat me-1"></i>API Health</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="demo-banner d-flex align-items-center justify-content-between">
            <div>
                <span class="badge bg-warning text-dark me-2">SIMULATED DATA</span>
                <span class="text-muted">All data shown is synthetic for demonstration purposes. No real client data is used.</span>
            </div>
            <small class="text-muted">API: <code>localhost:8000</code></small>
        </div>

        {% block content %}{% endblock %}
    </div>

    <footer class="container mt-5 mb-4 text-center text-muted">
        <small>Oaktree GPT 301 Workshop &mdash; Simulated Enterprise Data</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
